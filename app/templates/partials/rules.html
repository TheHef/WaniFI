<section x-show="tab === 'rules'">
  <!-- Add rule -->
  <div class="bg-slate-900 border border-slate-700/60 rounded-2xl p-5 mb-4">
    <h2 class="text-base font-semibold text-slate-200 mb-4">Add rule</h2>

    <div class="flex gap-2 mb-4">
      <button @click="newRule.rule_type = 'host_command'"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'host_command' ? 'bg-violet-500/20 border-violet-500/50 text-violet-300' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Host Command
      </button>
      <button @click="newRule.rule_type = 'docker'"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'docker' ? 'bg-blue-500/20 border-blue-500/50 text-blue-300' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Docker Container
      </button>
      <button @click="newRule.rule_type = 'qbittorrent'; newRule.action = 'alt_speed_on'; newRule.container = ''"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'qbittorrent' ? 'bg-green-500/20 border-green-500/50 text-green-300' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        qBittorrent
      </button>
      <button @click="newRule.rule_type = 'emby'; newRule.action = 'set_bitrate_limit'; newRule.container = ''"
              class="px-4 py-1.5 rounded-lg text-xs font-semibold border transition"
              :class="newRule.rule_type === 'emby' ? 'bg-sky-500/20 border-sky-500/50 text-sky-300' : 'bg-slate-800 border-slate-700 text-slate-500 hover:text-slate-300'">
        Emby
      </button>
    </div>

    <!-- Docker form -->
    <div x-show="newRule.rule_type === 'docker'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.container" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-blue-500">
        <option value="">— select container —</option>
        <template x-for="c in containers" :key="c.name">
          <option :value="c.name" x-text="c.name + ' (' + c.status + ')'"></option>
        </template>
      </select>
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-blue-500">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <select x-model="newRule.action" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-blue-500">
        <option value="stop">Stop container</option>
        <option value="start">Start container</option>
        <option value="restart">Restart container</option>
        <option value="pause">Pause container</option>
        <option value="unpause">Unpause container</option>
      </select>
      <input x-model="newRule.name" type="text" :placeholder="newRule.container || 'Name (optional)'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition">
      <button @click="addRule()" class="md:col-span-4 bg-blue-500 hover:bg-blue-400 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Add rule</button>
    </div>

    <!-- Host command form -->
    <div x-show="newRule.rule_type === 'host_command'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-violet-500">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <input x-model="newRule.command" type="text" placeholder="e.g. systemctl restart myservice"
             class="md:col-span-2 bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm font-mono text-slate-200 placeholder-slate-600 focus:outline-none focus:border-violet-500 transition">
      <input x-model="newRule.name" type="text" :placeholder="newRule.command || 'Name (optional)'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-violet-500 transition">
      <button @click="addRule()" class="md:col-span-4 bg-violet-500 hover:bg-violet-400 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Add rule</button>
    </div>

    <!-- Emby form -->
    <div x-show="newRule.rule_type === 'emby'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-sky-500">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <select x-model="newRule.action" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-sky-500">
        <option value="set_bitrate_limit">Set bitrate limit</option>
        <option value="clear_bitrate_limit">Clear bitrate limit (unlimited)</option>
        <option value="stop_all_sessions">Stop all sessions</option>
      </select>
      <input x-show="newRule.action === 'set_bitrate_limit'"
             x-model="newRule.container" type="number" min="1" placeholder="Mbps (e.g. 2)"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-sky-500 transition">
      <input x-model="newRule.name" type="text" placeholder="Name (optional)"
             :class="newRule.action === 'set_bitrate_limit' ? '' : 'md:col-span-2'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-sky-500 transition">
      <button @click="addRule()" class="md:col-span-4 bg-sky-600 hover:bg-sky-500 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Add rule</button>
    </div>

    <!-- qBittorrent form -->
    <div x-show="newRule.rule_type === 'qbittorrent'" class="grid md:grid-cols-4 gap-3">
      <select x-model="newRule.trigger" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-green-500">
        <option value="failover">On failover</option>
        <option value="restored">On restored</option>
        <option value="down">On WAN down</option>
        <option value="high_latency">On high latency</option>
      </select>
      <select x-model="newRule.action" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-green-500">
        <option value="alt_speed_on">Enable alt speed (turtle)</option>
        <option value="alt_speed_off">Disable alt speed</option>
        <option value="set_dl_limit">Set download limit</option>
        <option value="set_ul_limit">Set upload limit</option>
        <option value="pause_all">Pause all torrents</option>
        <option value="resume_all">Resume all torrents</option>
      </select>
      <input x-show="newRule.action === 'set_dl_limit' || newRule.action === 'set_ul_limit'"
             x-model="newRule.container" type="number" min="0" placeholder="Speed KB/s (0 = unlimited)"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-green-500 transition">
      <input x-model="newRule.name" type="text" placeholder="Name (optional)"
             :class="(newRule.action === 'set_dl_limit' || newRule.action === 'set_ul_limit') ? '' : 'md:col-span-2'"
             class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-green-500 transition">
      <button @click="addRule()" class="md:col-span-4 bg-green-600 hover:bg-green-500 text-white font-semibold rounded-xl px-4 py-2 text-sm transition">Add rule</button>
    </div>
  </div>

  <!-- Rules table -->
  <div class="bg-slate-900 border border-slate-700/60 rounded-2xl overflow-hidden mb-4">
    <table class="w-full text-sm">
      <thead class="text-xs font-semibold text-slate-500 uppercase tracking-wider bg-slate-950/50">
        <tr>
          <th class="text-left pl-4 pr-2 py-3 w-8"></th>
          <th class="text-left pl-4 pr-5 py-3 border-l border-slate-800">Rule</th>
          <th class="text-left px-4 py-3 border-l border-slate-800">Trigger</th>
          <th class="text-left px-4 py-3 border-l border-slate-800">Action</th>
          <th class="text-center px-4 py-3 border-l border-slate-800">Enabled</th>
          <th class="text-center px-4 py-3 border-l border-slate-800">Run</th>
          <th class="text-center px-4 py-3 border-l border-slate-800">Edit</th>
          <th class="text-center px-4 py-3 border-l border-slate-800">Delete</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="r in rules" :key="r.id">
          <tr class="border-t border-slate-800">
            <td class="pl-4 pr-2 py-3 w-8">
              <span class="w-6 h-6 flex items-center justify-center rounded shrink-0"
                    :class="r.rule_type === 'host_command' ? 'bg-violet-500/20 text-violet-400' : r.rule_type === 'qbittorrent' ? 'bg-green-500/20 text-green-400' : r.rule_type === 'emby' ? 'bg-sky-500/20 text-sky-400' : 'bg-blue-500/20 text-blue-400'"
                    :title="r.rule_type === 'host_command' ? 'Host Command' : r.rule_type === 'qbittorrent' ? 'qBittorrent' : r.rule_type === 'emby' ? 'Emby' : 'Docker Container'">
                <template x-if="r.rule_type === 'docker'">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 50 42" fill="currentColor">
                    <rect x="2"  y="17" width="8" height="7" rx="1.5"/>
                    <rect x="12" y="17" width="8" height="7" rx="1.5"/>
                    <rect x="22" y="17" width="8" height="7" rx="1.5"/>
                    <rect x="12" y="9"  width="8" height="7" rx="1.5"/>
                    <rect x="22" y="9"  width="8" height="7" rx="1.5"/>
                    <rect x="22" y="1"  width="8" height="7" rx="1.5"/>
                    <path d="M0 26c0 8.8 5.4 14 14 14h14c7 0 12-4.2 14-10 .8-2 1.5-5 0-6.5-1.2 0-3.2.5-5.5.5H0z"/>
                  </svg>
                </template>
                <template x-if="r.rule_type === 'host_command'">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 3H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h6l-1 2H8a1 1 0 0 0 0 2h8a1 1 0 0 0 0-2h-1l-1-2h6a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-1 12H5V6h14v9z"/>
                  </svg>
                </template>
                <template x-if="r.rule_type === 'qbittorrent'">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2 12C2 6.477 6.477 2 12 2s10 4.477 10 10v3h-4v-3a6 6 0 0 0-12 0v3H2v-3z"/>
                    <rect x="2" y="15" width="4" height="5" rx="1.5"/>
                    <rect x="18" y="15" width="4" height="5" rx="1.5"/>
                  </svg>
                </template>
                <template x-if="r.rule_type === 'emby'">
                  <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M4 3l7 9-7 9h2.5l5.5-7 5.5 7H20L13 12l7-9h-2.5L12 10 6.5 3H4z"/>
                  </svg>
                </template>
              </span>
            </td>
            <td class="pl-4 pr-5 py-3 border-l border-slate-800">
              <div class="text-sm font-medium text-slate-100"
                   x-text="r.name || (r.rule_type === 'host_command' ? r.command : r.rule_type === 'qbittorrent' ? ('qB: ' + r.action) : r.rule_type === 'emby' ? ('Emby: ' + r.action) : r.container)"></div>
              <div class="text-xs text-slate-500 font-mono mt-0.5"
                   x-show="r.name"
                   x-text="r.rule_type === 'host_command' ? r.command : r.rule_type === 'qbittorrent' ? r.action : r.rule_type === 'emby' ? r.action : r.container"></div>
            </td>
            <td class="px-4 py-3 text-slate-400 text-sm border-l border-slate-800"
                x-text="({failover:'→ On failover', restored:'→ On restored', down:'→ On WAN down', high_latency:'→ On high latency'})[r.trigger] || ('→ ' + r.trigger)"></td>
            <td class="px-4 py-3 text-slate-400 text-sm border-l border-slate-800"
                x-text="r.rule_type === 'host_command' ? 'run' : r.rule_type === 'qbittorrent' ? ({alt_speed_on:'turtle on', alt_speed_off:'turtle off', set_dl_limit:'dl limit', set_ul_limit:'ul limit', pause_all:'pause all', resume_all:'resume all'})[r.action] || r.action : r.rule_type === 'emby' ? ({set_bitrate_limit: r.container ? r.container+' Mbps limit' : 'set limit', clear_bitrate_limit:'unlimited', stop_all_sessions:'stop sessions'})[r.action] || r.action : r.action"></td>
            <td class="px-4 py-3 border-l border-slate-800 text-center">
              <button @click="toggleRule(r.id)" class="px-2.5 py-1 rounded-full text-xs font-medium transition"
                      :class="r.enabled ? 'bg-emerald-500/20 text-emerald-300' : 'bg-slate-700 text-slate-500'"
                      x-text="r.enabled ? 'Yes' : 'No'"></button>
            </td>
            <td class="px-4 py-3 border-l border-slate-800 text-center">
              <div class="flex flex-col items-center gap-1">
                <button @click="runRule(r.id)"
                        class="w-7 h-7 inline-flex items-center justify-center rounded-lg text-slate-600 hover:text-emerald-400 hover:bg-emerald-500/10 transition"
                        title="Run now">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
                  </svg>
                </button>
                <span x-show="runMsg && runMsg.id === r.id"
                      class="text-xs font-medium leading-tight"
                      :class="runMsg && runMsg.ok ? 'text-emerald-400' : 'text-red-400'"
                      x-text="runMsg ? runMsg.text : ''"></span>
              </div>
            </td>
            <td class="px-4 py-3 border-l border-slate-800 text-center">
              <button @click="editRule(r.id)" class="w-7 h-7 inline-flex items-center justify-center rounded-lg text-slate-600 hover:text-blue-400 hover:bg-blue-500/10 transition" title="Edit rule">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                </svg>
              </button>
            </td>
            <td class="px-4 py-3 border-l border-slate-800 text-center">
              <button @click="deleteRule(r.id)" class="w-7 h-7 inline-flex items-center justify-center rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10 transition" title="Delete rule">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                </svg>
              </button>
            </td>
          </tr>
        </template>
        <tr x-show="rules.length === 0">
          <td colspan="7" class="px-5 py-8 text-center text-slate-600">No rules yet</td>
        </tr>
      </tbody>
    </table>
  </div>

</section>
